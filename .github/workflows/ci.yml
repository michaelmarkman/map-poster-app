name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + unit + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      # Blocks on errors. Warnings are visible but non-fatal — let dev
      # experience surface them without blocking merges on noise.
      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Smoke
        run: npm run smoke

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
