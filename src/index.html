<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vedute</title>
  <meta name="description" content="Aerial city posters, made from 3D maps." />

  <!-- Open Graph + Twitter Card so links to vedute.com unfurl with the
       wordmark + a representative poster instead of a stripped-bare
       preview. The og:image points at one of the bundled style photos
       (the "realistic" preset's reference shot) — picked because it
       reads as a real product output rather than a UI screenshot. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Vedute" />
  <meta property="og:description" content="Aerial city posters, made from 3D maps." />
  <meta property="og:image" content="/style-photos/vedute-realistic-2x-20260422-1705.png" />
  <meta property="og:site_name" content="Vedute" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Vedute" />
  <meta name="twitter:description" content="Aerial city posters, made from 3D maps." />
  <meta name="twitter:image" content="/style-photos/vedute-realistic-2x-20260422-1705.png" />
  <meta name="theme-color" content="#09090b" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Fraunces is the editorial wordmark serif (Bodoni/Sectra lineage,
       free via Google Fonts); Inter is the UI body face. JetBrains Mono
       handles ratios + numerics. The legacy Playfair/Cormorant/Yeseva
       cohort is kept for the existing prototypes which still set in them;
       /app's design tokens (src/pages/editor/styles/tokens.css) point
       only at Fraunces + Inter + JetBrains Mono. -->
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;1,6..96,500;1,6..96,600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;1,400;0,700;0,900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Yeseva+One&family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Yesteryear&family=Oranienbaum&family=Outfit:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #09090b; color: #e8e4dc; font-family: 'Inter', system-ui, sans-serif; }
    input, button, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
