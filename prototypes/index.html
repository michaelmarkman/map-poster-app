<style>
  /* ═══════ Landing Page Specific ═══════ */

  /* Hero */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 80px 24px 60px;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(200, 184, 151, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 30% 70%, rgba(120, 90, 200, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 70% 30%, rgba(200, 120, 80, 0.04) 0%, transparent 50%);
    animation: heroPulse 12s ease-in-out infinite alternate;
  }
  @keyframes heroPulse {
    0% { opacity: 0.6; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  .hero-grid-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
  }

  .hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 720px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 28px;
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 300;
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-sub {
    font-size: clamp(16px, 2vw, 19px);
    color: var(--ink-soft);
    max-width: 520px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }

  .hero-ctas {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 720px;
    transition: opacity 0.1s linear, transform 0.1s linear;
  }

  .hero-proof {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
    font-size: 13px;
    color: var(--ink-dim);
  }
  .hero-proof-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--ink-dim);
  }

  .hero-visual {
    margin-top: 64px;
    position: relative;
  }

  .hero-poster-wrap {
    perspective: 800px;
    display: flex;
    justify-content: center;
  }

  .hero-poster {
    width: clamp(280px, 50vw, 480px);
    aspect-ratio: 3/4;
    border-radius: 12px;
    background: var(--bg-2);
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    transform: rotateX(8deg) rotateY(-6deg);
    box-shadow:
      -20px 30px 60px rgba(0,0,0,0.5),
      -5px 8px 20px rgba(0,0,0,0.3),
      inset 0 0 0 1px rgba(255,255,255,0.05);
    animation: posterFloat 6s ease-in-out infinite alternate;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-dim);
    font-size: 14px;
    position: relative;
  }
  @keyframes posterFloat {
    0% { transform: rotateX(8deg) rotateY(-6deg) translateY(0); }
    100% { transform: rotateX(6deg) rotateY(-4deg) translateY(-10px); }
  }

  .hero-poster-inner {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(200,184,151,0.06) 0%, transparent 40%),
      linear-gradient(225deg, rgba(100,80,160,0.04) 0%, transparent 40%),
      var(--bg-2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
  }

  .poster-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(200, 184, 151, 0.04) 45%,
      rgba(200, 184, 151, 0.08) 50%,
      rgba(200, 184, 151, 0.04) 55%,
      transparent 60%
    );
    background-size: 200% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 200% 0; }
    50% { background-position: -200% 0; }
  }

  .poster-grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,184,151,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,184,151,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: linear-gradient(to bottom, transparent 10%, rgba(0,0,0,0.3) 50%, transparent 90%);
  }

  .poster-content {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 24px;
  }

  .poster-silhouette {
    position: absolute;
    bottom: 30%;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 50%;
    background:
      radial-gradient(ellipse 30% 70% at 35% 60%, rgba(200,184,151,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 20% 90% at 50% 50%, rgba(200,184,151,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 25% 60% at 65% 65%, rgba(200,184,151,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 15% 40% at 42% 55%, rgba(200,184,151,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 18% 50% at 58% 58%, rgba(200,184,151,0.06) 0%, transparent 70%);
  }

  .poster-label-group {
    text-align: center;
    padding-bottom: 8px;
  }

  .poster-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-dim);
  }
  .poster-sublabel {
    font-family: var(--mono, monospace);
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--ink-dim);
    opacity: 0.5;
    margin-top: 4px;
  }

  /* How It Works */
  .how-section {
    padding: 100px 0;
    position: relative;
  }
  .section-title {
    text-align: center;
    margin-bottom: 56px;
  }
  .section-title h2 {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .section-title p {
    color: var(--ink-soft);
    font-size: 16px;
  }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 960px;
    margin: 0 auto;
  }
  @media (max-width: 768px) { .steps-grid { grid-template-columns: 1fr; max-width: 400px; } }

  .step-card {
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    padding: 36px 28px;
    text-align: center;
    transition: all var(--transition);
  }
  .step-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-4px); }

  .step-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin: 0 auto 20px;
  }
  .step-number {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .step-card h3 { font-size: 17px; font-weight: 500; margin-bottom: 8px; }
  .step-card p { font-size: 14px; color: var(--ink-soft); line-height: 1.6; }

  /* Gallery Preview */
  .gallery-section { padding: 80px 0; }
  .gallery-preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 960px;
    margin: 0 auto 32px;
  }
  @media (max-width: 768px) { .gallery-preview-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .gallery-preview-grid { grid-template-columns: 1fr; } }

  .gallery-preview-card {
    aspect-ratio: 3/4;
    background: var(--bg-2);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    transition: all var(--transition);
  }
  .gallery-preview-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-3px); }
  .gallery-preview-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .gallery-preview-card .gp-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: white;
  }
  .gp-overlay .gp-title { font-size: 14px; font-weight: 500; }
  .gp-overlay .gp-location { font-size: 12px; opacity: 0.7; }

  .gallery-preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--ink-dim);
    font-size: 13px;
  }
  .gpp-icon { font-size: 32px; opacity: 0.3; }

  .see-more {
    text-align: center;
  }

  /* Stats Strip */
  .stats-strip {
    padding: 60px 0;
    border-top: 1px solid var(--panel-border);
    border-bottom: 1px solid var(--panel-border);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    text-align: center;
  }
  .stat-value {
    font-family: var(--serif);
    font-size: clamp(28px, 3vw, 36px);
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 13px;
    color: var(--ink-soft);
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; }
  }

  /* Features */
  .features-section { padding: 80px 0; }
  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 960px;
    margin: 0 auto;
  }
  @media (max-width: 768px) { .features-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .features-grid { grid-template-columns: 1fr; max-width: 400px; } }
  .feature-card {
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    transition: all var(--transition);
  }
  .feature-card:hover { border-color: rgba(200,184,151,0.2); transform: translateY(-3px); }
  .feature-icon {
    font-size: 28px;
    margin-bottom: 14px;
  }
  .feature-card h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .feature-card p { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

  /* Quick Start Locations */
  .quickstart-section { padding: 80px 0; }
  .quickstart-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 700px;
    margin: 0 auto;
  }
  .quickstart-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    color: var(--ink);
    font-size: 14px;
    transition: all var(--transition);
    text-decoration: none;
  }
  .quickstart-card:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateY(-2px);
    color: var(--ink);
  }
  .quickstart-emoji { font-size: 18px; }
  .quickstart-name { font-weight: 400; }

  /* Testimonials */
  .testimonials-section { padding: 80px 0; }
  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 960px;
    margin: 0 auto;
  }
  @media (max-width: 768px) { .testimonials-grid { grid-template-columns: 1fr; max-width: 480px; } }
  .testimonial-card {
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    margin: 0;
    transition: all var(--transition);
  }
  .testimonial-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-3px); }
  .testimonial-card p {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }
  .testimonial-card footer { border-top: 1px solid var(--panel-border); padding-top: 14px; }
  .testimonial-author { font-size: 14px; font-weight: 500; color: var(--ink); }
  .testimonial-role { font-size: 12px; color: var(--ink-dim); margin-top: 2px; }

  /* Pricing */
  .pricing-section { padding: 80px 0; }

  /* CTA */
  .cta-section {
    padding: 100px 0;
    text-align: center;
    position: relative;
  }
  .cta-section h2 {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 300;
    margin-bottom: 14px;
  }
  .cta-section p {
    color: var(--ink-soft);
    font-size: 16px;
    margin-bottom: 28px;
  }
</style>
