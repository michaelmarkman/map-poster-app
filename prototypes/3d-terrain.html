<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapPoster — 3D Terrain + Elevation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #111113;
  --sidebar: #18181b;
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.07);
  --accent: #a78bfa;
  --accent-dim: rgba(167,139,250,0.15);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --text: #e4e4e7;
  --text-dim: #71717a;
  --text-muted: #52525b;
  --font-ui: 'Inter', -apple-system, sans-serif;
  --font-display: 'Playfair Display', serif;
  --font-mono: 'Space Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Top Nav */
.topnav {
  height: 56px;
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  z-index: 100;
}

.logo {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.5px;
  user-select: none;
}
.logo span { color: var(--accent); }

.steps {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: 10px;
  padding: 4px;
}
.step {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.step:hover { color: var(--text); }
.step.done { color: var(--accent); }
.step.done .step-icon { background: var(--accent); color: #111; }
.step.active { background: rgba(167,139,250,0.12); color: var(--accent); }
.step-icon {
  width: 20px; height: 20px;
  border-radius: 6px;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  border: 1px solid var(--border);
}
.step.done .step-icon { border: none; }
.step.active .step-icon { border-color: var(--accent); background: var(--accent-dim); }
.step-arrow { color: var(--text-muted); font-size: 11px; margin: 0 2px; display:flex;align-items:center; }

.nav-actions {
  display: flex;
  gap: 8px;
}
.btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { border-color: var(--border-hover); background: var(--card); }
.btn-primary {
  background: var(--accent);
  color: #111;
  border-color: var(--accent);
}
.btn-primary:hover { background: #b89dfc; border-color: #b89dfc; }

/* Main Layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Preview Area */
.preview-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(167,139,250,0.03) 0%, transparent 60%),
    var(--bg);
}

.poster-wrap {
  position: relative;
  width: auto;
  height: 100%;
  max-height: calc(100vh - 120px);
  aspect-ratio: 18/24;
}

.poster {
  width: 100%;
  height: 100%;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 20px 60px rgba(0,0,0,0.5),
    0 0 120px rgba(167,139,250,0.06);
  transition: box-shadow 0.4s;
}

.poster svg {
  width: 100%;
  height: 100%;
  display: block;
}

.size-badge {
  position: absolute;
  bottom: -32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  background: var(--card);
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  white-space: nowrap;
}

/* Sidebar */
.sidebar {
  width: 320px;
  background: var(--sidebar);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border-hover); }

/* Presets Grid */
.presets-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.preset {
  background: var(--card);
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.preset:hover { background: var(--card-hover); border-color: var(--border-hover); }
.preset.active { border-color: var(--accent); background: var(--accent-dim); }
.preset-preview {
  width: 100%;
  aspect-ratio: 3/4;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 6px;
  background: #0a0a0c;
}
.preset-preview svg { width: 100%; height: 100%; }
.preset-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
}

/* Palette */
.palette-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.swatch {
  width: 32px; height: 32px;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.swatch:hover { transform: scale(1.1); }
.swatch.active { border-color: #fff; }
.swatch input[type="color"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

/* Sliders */
.slider-group { margin-bottom: 2px; }
.slider-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.slider-label span:last-child {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
}
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.08);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

/* Layer toggles */
.layer-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.layer-item:last-child { border-bottom: none; }
.layer-info {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.layer-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

/* Switch */
.switch {
  width: 36px; height: 20px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.switch.on { background: var(--accent); }
.switch::after {
  content: '';
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.switch.on::after { transform: translateX(16px); }

/* Text input */
.text-input {
  width: 100%;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 8px;
}
.text-input:focus { border-color: var(--accent); }

/* Light angle dial */
.dial-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
}
.dial {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--card);
  border: 2px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: border-color 0.2s;
  flex-shrink: 0;
}
.dial:hover { border-color: var(--border-hover); }
.dial-indicator {
  position: absolute;
  width: 3px; height: 20px;
  background: var(--accent);
  border-radius: 2px;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  transform-origin: center 24px;
  transition: transform 0.15s;
}
.dial-center {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.dial-label {
  font-size: 12px;
  color: var(--text-dim);
}
.dial-value {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
}

/* Segment control */
.segment {
  display: flex;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}
.seg-btn {
  flex: 1;
  padding: 6px 8px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.seg-btn:hover { color: var(--text); }
.seg-btn.active { background: var(--accent-dim); color: var(--accent); }
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="topnav">
  <div class="logo">map<span>poster</span></div>
  <div class="steps">
    <div class="step done">
      <div class="step-icon">&#10003;</div>
      Place
    </div>
    <span class="step-arrow">&rarr;</span>
    <div class="step active">
      <div class="step-icon">2</div>
      Style
    </div>
    <span class="step-arrow">&rarr;</span>
    <div class="step">
      <div class="step-icon">3</div>
      Export
    </div>
  </div>
  <div class="nav-actions">
    <button class="btn">&larr; Back</button>
    <button class="btn btn-primary">Export &nearr;</button>
  </div>
</nav>

<!-- Main -->
<div class="main">
  <!-- Preview -->
  <div class="preview-area">
    <div class="poster-wrap">
      <div class="poster" id="poster"></div>
      <div class="size-badge">18 &times; 24 in</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Style Presets -->
    <div>
      <div class="section-title">Style Presets</div>
      <div class="presets-grid" id="presets-grid"></div>
    </div>

    <!-- Palette -->
    <div>
      <div class="section-title">Palette</div>
      <div class="card">
        <div class="palette-row" id="palette-row"></div>
      </div>
    </div>

    <!-- Terrain -->
    <div>
      <div class="section-title">Terrain</div>
      <div class="card" style="display:flex;flex-direction:column;gap:12px;">
        <div class="slider-group">
          <div class="slider-label"><span>Elevation Scale</span><span id="elev-val">1.0&times;</span></div>
          <input type="range" id="elev-scale" min="0.2" max="2.5" step="0.05" value="1.0">
        </div>
        <div>
          <div class="slider-label"><span>Contour Density</span></div>
          <div class="segment" id="contour-seg">
            <button class="seg-btn" data-val="few">Few</button>
            <button class="seg-btn active" data-val="medium">Medium</button>
            <button class="seg-btn" data-val="dense">Dense</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Layers -->
    <div>
      <div class="section-title">Layers</div>
      <div class="card" id="layers-card"></div>
    </div>

    <!-- Lighting -->
    <div>
      <div class="section-title">Lighting</div>
      <div class="card" style="display:flex;flex-direction:column;gap:12px;">
        <div class="dial-wrap">
          <div class="dial" id="dial">
            <div class="dial-indicator" id="dial-indicator"></div>
            <div class="dial-center"></div>
          </div>
          <div>
            <div class="dial-label">Light Angle</div>
            <div class="dial-value" id="dial-value">315&deg;</div>
          </div>
        </div>
        <div>
          <div class="slider-label"><span>Intensity</span></div>
          <div class="segment" id="intensity-seg">
            <button class="seg-btn" data-val="low">Low</button>
            <button class="seg-btn" data-val="medium">Medium</button>
            <button class="seg-btn active" data-val="high">High</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Street Weight -->
    <div>
      <div class="section-title">Street Weight</div>
      <div class="card">
        <div class="segment" id="street-seg">
          <button class="seg-btn" data-val="thin">Thin</button>
          <button class="seg-btn active" data-val="medium">Medium</button>
          <button class="seg-btn" data-val="bold">Bold</button>
        </div>
      </div>
    </div>

    <!-- Text -->
    <div>
      <div class="section-title">Text</div>
      <div class="card" style="display:flex;flex-direction:column;gap:6px;">
        <input class="text-input" id="input-title" value="Brooklyn" placeholder="Place name">
        <input class="text-input" id="input-subtitle" value="New York, United States" placeholder="Subtitle">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
          <span style="font-size:12px;color:var(--text-dim)">Show coordinates</span>
          <div class="switch on" id="coords-toggle"></div>
        </div>
        <div style="margin-top:6px;">
          <div class="slider-label"><span>Text Position</span></div>
          <div class="segment" id="textpos-seg">
            <button class="seg-btn" data-val="top">Top</button>
            <button class="seg-btn active" data-val="bottom">Bottom</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Glow -->
    <div>
      <div class="section-title">Atmosphere</div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:13px">Horizon Glow</span>
          <div class="switch on" id="glow-toggle"></div>
        </div>
      </div>
    </div>

    <!-- Border & Margin -->
    <div>
      <div class="section-title">Border &amp; Margin</div>
      <div class="card" style="display:flex;flex-direction:column;gap:12px;">
        <div class="slider-group">
          <div class="slider-label"><span>Margin</span><span id="margin-val">24px</span></div>
          <input type="range" id="margin-slider" min="0" max="60" step="2" value="24">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:13px">Show Border</span>
          <div class="switch on" id="border-toggle"></div>
        </div>
      </div>
    </div>

    <div style="height:24px;flex-shrink:0"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // State
  var state = {
    preset: 'dark-relief',
    palette: ['#1a1040', '#a78bfa', '#3b1d8e', '#0ea5e9'],
    elevScale: 1.0,
    contourDensity: 'medium',
    layers: { terrain: true, contours: true, streets: true, water: true, buildings: true, labels: true },
    lightAngle: 315,
    lightIntensity: 'high',
    streetWeight: 'medium',
    title: 'Brooklyn',
    subtitle: 'New York, United States',
    showCoords: true,
    textPos: 'bottom',
    glow: true,
    showBorder: true,
    margin: 24,
  };

  var presets = {
    'topo-classic': { name: 'Topo Classic', palette: ['#f5f0e8', '#6b8f71', '#3d5a45', '#2a3d2e'], bg: '#f5f0e8', terrain: '#3d5a45', accent: '#6b8f71', water: '#89b4c4', contour: '#4a6b4f', text: '#2a3d2e', glow: '#a8c5a0' },
    'dark-relief': { name: 'Dark Relief', palette: ['#1a1040', '#a78bfa', '#3b1d8e', '#0ea5e9'], bg: '#0a0810', terrain: '#a78bfa', accent: '#7c3aed', water: '#0ea5e9', contour: '#6d52b0', text: '#e4e4e7', glow: '#a78bfa' },
    'neon-contour': { name: 'Neon Contour', palette: ['#0d0d0d', '#00ff88', '#ff006e', '#00d4ff'], bg: '#050505', terrain: '#00ff88', accent: '#ff006e', water: '#00d4ff', contour: '#00ff88', text: '#ffffff', glow: '#00ff88' },
    'elevation-heat': { name: 'Elevation Heat', palette: ['#1a0a00', '#ff6b35', '#ffd700', '#ff1744'], bg: '#0f0800', terrain: '#ff6b35', accent: '#ffd700', water: '#1a3a5c', contour: '#ff8c42', text: '#ffeedd', glow: '#ff6b35' },
  };

  // Helpers
  function lerp(a, b, t) { return a + (b - a) * t; }
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }
  function rgbToHex(r,g,b) { return '#' + [r,g,b].map(function(c){ return Math.max(0,Math.min(255,Math.round(c))).toString(16).padStart(2,'0'); }).join(''); }
  function lerpColor(c1, c2, t) {
    var a = hexToRgb(c1), b = hexToRgb(c2);
    return rgbToHex(lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t));
  }
  function darken(hex, amt) {
    var c = hexToRgb(hex);
    return rgbToHex(c[0]*(1-amt), c[1]*(1-amt), c[2]*(1-amt));
  }
  function lighten(hex, amt) {
    var c = hexToRgb(hex);
    return rgbToHex(c[0] + (255-c[0])*amt, c[1] + (255-c[1])*amt, c[2] + (255-c[2])*amt);
  }

  function seededRandom(seed) {
    var s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.textContent;
  }

  // Terrain generation
  function generateTerrainPath(y, amplitude, freq, phase, w) {
    var parts = [];
    var steps = 80;
    for (var i = 0; i <= steps; i++) {
      var x = (i / steps) * w;
      var noise = Math.sin(x * freq * 0.01 + phase) * amplitude
                + Math.sin(x * freq * 0.023 + phase * 1.7) * amplitude * 0.5
                + Math.sin(x * freq * 0.047 + phase * 2.3) * amplitude * 0.25
                + Math.sin(x * freq * 0.091 + phase * 3.1) * amplitude * 0.12;
      var cy = y + noise * state.elevScale;
      if (i === 0) parts.push('M 0 ' + cy.toFixed(1));
      else parts.push('L ' + x.toFixed(1) + ' ' + cy.toFixed(1));
    }
    return parts.join(' ');
  }

  function generateContourLine(baseY, amplitude, freq, phase, w, offset) {
    var parts = [];
    var steps = 100;
    for (var i = 0; i <= steps; i++) {
      var x = (i / steps) * w;
      var noise = Math.sin(x * freq * 0.01 + phase + offset) * amplitude
                + Math.sin(x * freq * 0.019 + phase * 1.3 + offset * 0.7) * amplitude * 0.6
                + Math.sin(x * freq * 0.037 + phase * 2.1 + offset * 1.3) * amplitude * 0.3
                + Math.cos(x * freq * 0.053 + phase * 0.8 + offset * 2.1) * amplitude * 0.15;
      var cy = baseY + noise * state.elevScale;
      if (i === 0) parts.push('M ' + x.toFixed(1) + ' ' + cy.toFixed(1));
      else parts.push('L ' + x.toFixed(1) + ' ' + cy.toFixed(1));
    }
    return parts.join(' ');
  }

  function generateStreetPath(w, h, seed, type) {
    var rng = seededRandom(seed);
    var parts = [];
    if (type === 'h') {
      var y = h * (0.2 + rng() * 0.6);
      parts.push('M 0 ' + y.toFixed(1));
      for (var x = 0; x <= w; x += w / 20) {
        var wave = Math.sin(x * 0.015 + seed) * 8 * state.elevScale + Math.sin(x * 0.04 + seed * 1.5) * 3 * state.elevScale;
        parts.push('L ' + x.toFixed(1) + ' ' + (y + wave).toFixed(1));
      }
    } else {
      var xp = w * (0.15 + rng() * 0.7);
      parts.push('M ' + xp.toFixed(1) + ' 0');
      for (var y2 = 0; y2 <= h; y2 += h / 20) {
        var wave2 = Math.sin(y2 * 0.012 + seed) * 6 * state.elevScale + Math.sin(y2 * 0.035 + seed * 1.3) * 2.5 * state.elevScale;
        parts.push('L ' + (xp + wave2).toFixed(1) + ' ' + y2.toFixed(1));
      }
    }
    return parts.join(' ');
  }

  // Build SVG as DOM
  function buildPosterSVG() {
    var p = presets[state.preset];
    var W = 540, H = 720;
    var margin = state.margin * (540 / 320);
    var innerW = W - margin * 2;
    var innerH = H - margin * 2;
    var innerX = margin;
    var innerY = margin;

    var lightRad = state.lightAngle * Math.PI / 180;
    var lightXc = Math.cos(lightRad);
    var lightYc = Math.sin(lightRad);
    var intensityMul = state.lightIntensity === 'low' ? 0.4 : state.lightIntensity === 'medium' ? 0.7 : 1.0;
    var sw = state.streetWeight === 'thin' ? 0.5 : state.streetWeight === 'medium' ? 1.0 : 1.8;
    var contourCounts = { few: 25, medium: 55, dense: 120 };
    var numContours = contourCounts[state.contourDensity];

    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.display = 'block';

    // Defs
    var defs = document.createElementNS(ns, 'defs');

    // Clip path
    var clipPath = document.createElementNS(ns, 'clipPath');
    clipPath.setAttribute('id', 'inner-clip');
    var clipRect = document.createElementNS(ns, 'rect');
    clipRect.setAttribute('x', innerX);
    clipRect.setAttribute('y', innerY);
    clipRect.setAttribute('width', innerW);
    clipRect.setAttribute('height', innerH);
    clipRect.setAttribute('rx', '2');
    clipPath.appendChild(clipRect);
    defs.appendChild(clipPath);

    // Background gradient
    var bgGrad = document.createElementNS(ns, 'linearGradient');
    bgGrad.setAttribute('id', 'bg-grad');
    bgGrad.setAttribute('x1', '0'); bgGrad.setAttribute('y1', '0');
    bgGrad.setAttribute('x2', '0'); bgGrad.setAttribute('y2', '1');
    var stops = [
      { offset: '0%', color: lighten(p.bg, 0.08 * intensityMul) },
      { offset: '40%', color: p.bg },
      { offset: '100%', color: darken(p.bg, 0.15) }
    ];
    stops.forEach(function(s) {
      var stop = document.createElementNS(ns, 'stop');
      stop.setAttribute('offset', s.offset);
      stop.setAttribute('stop-color', s.color);
      bgGrad.appendChild(stop);
    });
    defs.appendChild(bgGrad);

    // Water gradient
    var waterGrad = document.createElementNS(ns, 'linearGradient');
    waterGrad.setAttribute('id', 'water-grad');
    waterGrad.setAttribute('x1', '0'); waterGrad.setAttribute('y1', '0');
    waterGrad.setAttribute('x2', '0'); waterGrad.setAttribute('y2', '1');
    var wStop1 = document.createElementNS(ns, 'stop');
    wStop1.setAttribute('offset', '0%');
    wStop1.setAttribute('stop-color', p.water);
    wStop1.setAttribute('stop-opacity', '0.6');
    waterGrad.appendChild(wStop1);
    var wStop2 = document.createElementNS(ns, 'stop');
    wStop2.setAttribute('offset', '100%');
    wStop2.setAttribute('stop-color', darken(p.water, 0.5));
    wStop2.setAttribute('stop-opacity', '0.9');
    waterGrad.appendChild(wStop2);
    defs.appendChild(waterGrad);

    // Glow gradient
    var glowGrad = document.createElementNS(ns, 'radialGradient');
    glowGrad.setAttribute('id', 'glow-grad');
    glowGrad.setAttribute('cx', '0.5'); glowGrad.setAttribute('cy', '0.85');
    glowGrad.setAttribute('r', '0.6');
    var gStop1 = document.createElementNS(ns, 'stop');
    gStop1.setAttribute('offset', '0%');
    gStop1.setAttribute('stop-color', p.glow);
    gStop1.setAttribute('stop-opacity', state.glow ? String(0.18 * intensityMul) : '0');
    glowGrad.appendChild(gStop1);
    var gStop2 = document.createElementNS(ns, 'stop');
    gStop2.setAttribute('offset', '100%');
    gStop2.setAttribute('stop-color', p.glow);
    gStop2.setAttribute('stop-opacity', '0');
    glowGrad.appendChild(gStop2);
    defs.appendChild(glowGrad);

    // Filters
    function addBlurFilter(id, dev) {
      var f = document.createElementNS(ns, 'filter');
      f.setAttribute('id', id);
      var blur = document.createElementNS(ns, 'feGaussianBlur');
      blur.setAttribute('stdDeviation', String(dev));
      f.appendChild(blur);
      defs.appendChild(f);
    }
    addBlurFilter('terrain-blur', 1.5);
    addBlurFilter('glow-filter', 8);
    addBlurFilter('contour-glow', 2);
    addBlurFilter('street-glow', 1.2);

    svg.appendChild(defs);

    // Helper to create path element
    function makePath(d, attrs) {
      var el = document.createElementNS(ns, 'path');
      el.setAttribute('d', d);
      for (var k in attrs) el.setAttribute(k, String(attrs[k]));
      return el;
    }
    function makeRect(x, y, w, h, attrs) {
      var el = document.createElementNS(ns, 'rect');
      el.setAttribute('x', String(x)); el.setAttribute('y', String(y));
      el.setAttribute('width', String(w)); el.setAttribute('height', String(h));
      for (var k in attrs) el.setAttribute(k, String(attrs[k]));
      return el;
    }
    function makeText(x, y, text, attrs) {
      var el = document.createElementNS(ns, 'text');
      el.setAttribute('x', String(x)); el.setAttribute('y', String(y));
      for (var k in attrs) el.setAttribute(k, String(attrs[k]));
      el.textContent = text;
      return el;
    }

    // Background
    svg.appendChild(makeRect(0, 0, W, H, { fill: p.bg }));

    // Border
    if (state.showBorder) {
      svg.appendChild(makeRect(innerX, innerY, innerW, innerH, {
        fill: 'none', stroke: p.contour, 'stroke-opacity': '0.2', 'stroke-width': '1', rx: '2'
      }));
    }

    // Clipped group
    var clipG = document.createElementNS(ns, 'g');
    clipG.setAttribute('clip-path', 'url(#inner-clip)');

    // BG gradient rect
    clipG.appendChild(makeRect(innerX, innerY, innerW, innerH, { fill: 'url(#bg-grad)' }));

    // Atmospheric glow
    clipG.appendChild(makeRect(innerX, innerY, innerW, innerH, {
      fill: 'url(#glow-grad)', opacity: state.glow ? '1' : '0'
    }));

    // Water
    if (state.layers.water) {
      var waterG = document.createElementNS(ns, 'g');
      var waterPath = generateTerrainPath(innerY + innerH * 0.72, 6, 2.5, 42, innerW);
      waterG.appendChild(makePath(waterPath + ' L ' + innerW + ' ' + (innerY + innerH) + ' L 0 ' + (innerY + innerH) + ' Z', {
        fill: 'url(#water-grad)', transform: 'translate(' + innerX + ',0)'
      }));
      for (var wi = 0; wi < 12; wi++) {
        var wy = innerY + innerH * (0.76 + wi * 0.018);
        var line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', String(innerX + 20));
        line.setAttribute('y1', String(wy));
        line.setAttribute('x2', String(innerX + innerW - 20));
        line.setAttribute('y2', String(wy));
        line.setAttribute('stroke', p.water);
        line.setAttribute('stroke-opacity', String(Math.max(0, 0.08 - wi * 0.005)));
        line.setAttribute('stroke-width', '0.5');
        waterG.appendChild(line);
      }
      waterG.appendChild(makePath(waterPath, {
        fill: 'none', stroke: p.water, 'stroke-opacity': '0.3', 'stroke-width': '2',
        filter: 'url(#street-glow)', transform: 'translate(' + innerX + ',0)'
      }));
      clipG.appendChild(waterG);
    }

    // Terrain layers
    if (state.layers.terrain) {
      var terrainG = document.createElementNS(ns, 'g');
      var numLayers = 18;
      for (var ti = numLayers - 1; ti >= 0; ti--) {
        var tt = ti / numLayers;
        var baseY = innerY + innerH * (0.15 + tt * 0.55);
        var amp = (12 + (1 - tt) * 25) * (1 + Math.sin(tt * Math.PI) * 0.5);
        var freq = 2.5 + tt * 1.5;
        var phase = ti * 2.7 + 10;

        var lightBias = (lightXc * Math.cos(tt * Math.PI) + lightYc * Math.sin(tt * Math.PI * 0.5)) * 0.5 * intensityMul;
        var layerColor;
        if (lightBias > 0) {
          layerColor = lighten(lerpColor(darken(p.bg, 0.1), p.terrain, 0.15 + tt * 0.5), lightBias * 0.15);
        } else {
          layerColor = darken(lerpColor(darken(p.bg, 0.1), p.terrain, 0.15 + tt * 0.5), Math.abs(lightBias) * 0.2);
        }

        var tPath = generateTerrainPath(baseY, amp, freq, phase, innerW);
        var closePath = ' L ' + innerW + ' ' + (innerY + innerH + 10) + ' L 0 ' + (innerY + innerH + 10) + ' Z';

        // Shadow
        terrainG.appendChild(makePath(tPath + closePath, {
          fill: darken(layerColor, 0.3), opacity: '0.3', filter: 'url(#terrain-blur)',
          transform: 'translate(' + innerX + ', 3)'
        }));
        // Main layer
        terrainG.appendChild(makePath(tPath + closePath, {
          fill: layerColor, opacity: String((0.6 + tt * 0.4).toFixed(2)),
          transform: 'translate(' + innerX + ', 0)'
        }));
        // Ridge highlight
        var highlightOpacity = Math.max(0, lightBias) * 0.4 * intensityMul;
        if (highlightOpacity > 0.02) {
          terrainG.appendChild(makePath(tPath, {
            fill: 'none', stroke: lighten(p.terrain, 0.4),
            'stroke-opacity': String(highlightOpacity.toFixed(3)),
            'stroke-width': '1.5',
            transform: 'translate(' + innerX + ', 0)'
          }));
        }
      }
      clipG.appendChild(terrainG);
    }

    // Contour lines
    if (state.layers.contours) {
      var contourG = document.createElementNS(ns, 'g');
      var isNeon = state.preset === 'neon-contour';
      for (var ci = 0; ci < numContours; ci++) {
        var ct = ci / numContours;
        var cBaseY = innerY + innerH * (0.1 + ct * 0.6);
        var cAmp = (5 + ct * 15) * (0.5 + Math.sin(ct * Math.PI * 3) * 0.3);
        var cFreq = 2 + ct * 2;
        var cPhase = ci * 1.73 + 5;
        var cOffset = ci * 0.5;
        var cPath = generateContourLine(cBaseY, cAmp, cFreq, cPhase, innerW, cOffset);

        var contourOpacity = isNeon ? (0.3 + Math.sin(ct * Math.PI * 2) * 0.3) : (0.08 + ct * 0.12);
        var contourWidth = isNeon ? (0.6 + Math.sin(ci * 0.7) * 0.3) : (0.3 + Math.sin(ci * 0.5) * 0.15);
        var contourColor = isNeon ? p.contour : lerpColor(p.contour, lighten(p.contour, 0.3), ct);

        if (isNeon) {
          contourG.appendChild(makePath(cPath, {
            fill: 'none', stroke: contourColor,
            'stroke-opacity': String((contourOpacity * 0.5).toFixed(3)),
            'stroke-width': String((contourWidth * 3).toFixed(2)),
            filter: 'url(#contour-glow)',
            transform: 'translate(' + innerX + ', 0)'
          }));
        }
        contourG.appendChild(makePath(cPath, {
          fill: 'none', stroke: contourColor,
          'stroke-opacity': String(contourOpacity.toFixed(3)),
          'stroke-width': String(contourWidth.toFixed(2)),
          transform: 'translate(' + innerX + ', 0)'
        }));
      }
      clipG.appendChild(contourG);
    }

    // Streets
    if (state.layers.streets) {
      var streetG = document.createElementNS(ns, 'g');
      var isNeonS = state.preset === 'neon-contour';
      var sColor = isNeonS ? p.accent : lighten(p.bg, 0.25);

      var hSeeds = [101, 207, 319, 428, 537, 612, 733, 844, 901, 1055];
      for (var si = 0; si < 10; si++) {
        var sPath = generateStreetPath(innerW, innerH * 0.7, hSeeds[si], 'h');
        if (isNeonS) {
          streetG.appendChild(makePath(sPath, {
            fill: 'none', stroke: sColor,
            'stroke-opacity': '0.15', 'stroke-width': String(sw * 3),
            filter: 'url(#street-glow)',
            transform: 'translate(' + innerX + ',' + innerY + ')'
          }));
        }
        streetG.appendChild(makePath(sPath, {
          fill: 'none', stroke: sColor,
          'stroke-opacity': isNeonS ? '0.5' : '0.2',
          'stroke-width': String(sw),
          transform: 'translate(' + innerX + ',' + innerY + ')'
        }));
      }
      var vSeeds = [151, 267, 389, 478, 567, 698, 789, 823, 945, 1012, 1134, 1256];
      for (var vi = 0; vi < 12; vi++) {
        var vPath = generateStreetPath(innerW, innerH * 0.7, vSeeds[vi], 'v');
        if (isNeonS) {
          streetG.appendChild(makePath(vPath, {
            fill: 'none', stroke: sColor,
            'stroke-opacity': '0.12', 'stroke-width': String(sw * 3),
            filter: 'url(#street-glow)',
            transform: 'translate(' + innerX + ',' + innerY + ')'
          }));
        }
        streetG.appendChild(makePath(vPath, {
          fill: 'none', stroke: sColor,
          'stroke-opacity': isNeonS ? '0.4' : '0.15',
          'stroke-width': String(sw * 0.7),
          transform: 'translate(' + innerX + ',' + innerY + ')'
        }));
      }
      clipG.appendChild(streetG);
    }

    // Buildings
    if (state.layers.buildings) {
      var buildG = document.createElementNS(ns, 'g');
      var rng = seededRandom(42);
      var isHeat = state.preset === 'elevation-heat';
      for (var bi = 0; bi < 200; bi++) {
        var bx = innerX + rng() * innerW;
        var by = innerY + innerH * (0.15 + rng() * 0.55);
        var elevFactor = 1 - ((by - innerY) / (innerH * 0.7));
        var bw = 1.5 + rng() * 3;
        var bh = (2 + rng() * 5) * (0.5 + elevFactor * 1.5) * state.elevScale;
        if (by > innerY + innerH * 0.68) continue;
        var buildColor = isHeat ? lerpColor('#ff6b35', '#ffd700', elevFactor) : lighten(p.bg, 0.08 + elevFactor * 0.15);
        var buildOpacity = 0.3 + elevFactor * 0.4;
        buildG.appendChild(makeRect(bx, by - bh, bw, bh, {
          fill: buildColor, opacity: String(buildOpacity.toFixed(2)), rx: '0.5'
        }));
      }
      clipG.appendChild(buildG);
    }

    // Peak highlights
    if (state.layers.terrain) {
      var peakG = document.createElementNS(ns, 'g');
      var peakRng = seededRandom(99);
      for (var pi = 0; pi < 8; pi++) {
        var px = innerX + innerW * (0.1 + peakRng() * 0.8);
        var py = innerY + innerH * (0.15 + peakRng() * 0.25);
        var pr = 3 + peakRng() * 6;
        var circ = document.createElementNS(ns, 'circle');
        circ.setAttribute('cx', String(px.toFixed(1)));
        circ.setAttribute('cy', String(py.toFixed(1)));
        circ.setAttribute('r', String(pr.toFixed(1)));
        circ.setAttribute('fill', p.glow);
        circ.setAttribute('opacity', String((0.08 * intensityMul).toFixed(3)));
        circ.setAttribute('filter', 'url(#glow-filter)');
        peakG.appendChild(circ);
      }
      clipG.appendChild(peakG);
    }

    clipG.appendChild(document.createComment('end-clip'));
    svg.appendChild(clipG);

    // Labels
    if (state.layers.labels) {
      var labelG = document.createElementNS(ns, 'g');
      var textYPos = state.textPos === 'bottom' ? innerY + innerH - 20 : innerY + 50;
      var textX = W / 2;

      var tbgY = state.textPos === 'bottom' ? textYPos - 48 : textYPos - 32;
      labelG.appendChild(makeRect(innerX, tbgY, innerW, 75, { fill: p.bg, opacity: '0.6' }));

      labelG.appendChild(makeText(textX, textYPos, state.title.toUpperCase(), {
        'text-anchor': 'middle',
        'font-family': "'Playfair Display', serif",
        'font-weight': '700',
        'font-size': '28',
        fill: p.text,
        'letter-spacing': '4'
      }));
      labelG.appendChild(makeText(textX, textYPos + 18, state.subtitle.toUpperCase(), {
        'text-anchor': 'middle',
        'font-family': "'Inter', sans-serif",
        'font-weight': '300',
        'font-size': '10',
        fill: p.text,
        opacity: '0.6',
        'letter-spacing': '2'
      }));
      if (state.showCoords) {
        labelG.appendChild(makeText(textX, textYPos + 32, '40.6782\u00b0 N, 73.9442\u00b0 W', {
          'text-anchor': 'middle',
          'font-family': "'Space Mono', monospace",
          'font-size': '9',
          fill: p.text,
          opacity: '0.35'
        }));
      }
      svg.appendChild(labelG);
    }

    return svg;
  }

  function renderPoster() {
    var container = document.getElementById('poster');
    while (container.firstChild) container.removeChild(container.firstChild);
    container.appendChild(buildPosterSVG());
  }

  // Preset thumbnails using DOM methods
  function buildMiniSVG(p) {
    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 90 120');

    var bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('width', '90'); bg.setAttribute('height', '120');
    bg.setAttribute('fill', p.bg);
    svg.appendChild(bg);

    for (var i = 0; i < 6; i++) {
      var t = i / 6;
      var y = 20 + t * 60;
      var col = lerpColor(darken(p.bg, 0.1), p.terrain, 0.2 + t * 0.5);
      var parts = [];
      for (var x = 0; x <= 90; x += 5) {
        var wave = Math.sin(x * 0.08 + i * 2) * (6 + t * 8) + Math.sin(x * 0.15 + i * 3) * 3;
        if (x === 0) parts.push('M 0 ' + (y + wave).toFixed(1));
        else parts.push('L ' + x + ' ' + (y + wave).toFixed(1));
      }
      var path = document.createElementNS(ns, 'path');
      path.setAttribute('d', parts.join(' ') + ' L 90 120 L 0 120 Z');
      path.setAttribute('fill', col);
      path.setAttribute('opacity', String((0.5 + t * 0.5).toFixed(2)));
      svg.appendChild(path);
    }

    for (var ci = 0; ci < 8; ci++) {
      var cy = 15 + ci * 10;
      var cParts = [];
      for (var cx = 0; cx <= 90; cx += 5) {
        var cw = Math.sin(cx * 0.1 + ci * 1.5) * 4;
        if (cx === 0) cParts.push('M 0 ' + (cy + cw).toFixed(1));
        else cParts.push('L ' + cx + ' ' + (cy + cw).toFixed(1));
      }
      var cPath = document.createElementNS(ns, 'path');
      cPath.setAttribute('d', cParts.join(' '));
      cPath.setAttribute('fill', 'none');
      cPath.setAttribute('stroke', p.contour);
      cPath.setAttribute('stroke-opacity', '0.2');
      cPath.setAttribute('stroke-width', '0.4');
      svg.appendChild(cPath);
    }

    var waterRect = document.createElementNS(ns, 'rect');
    waterRect.setAttribute('x', '0'); waterRect.setAttribute('y', '90');
    waterRect.setAttribute('width', '90'); waterRect.setAttribute('height', '30');
    waterRect.setAttribute('fill', p.water); waterRect.setAttribute('opacity', '0.4');
    svg.appendChild(waterRect);

    return svg;
  }

  function renderPresetThumbnails() {
    var grid = document.getElementById('presets-grid');
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    Object.keys(presets).forEach(function(key) {
      var preset = presets[key];
      var div = document.createElement('div');
      div.className = 'preset' + (state.preset === key ? ' active' : '');
      div.dataset.preset = key;

      var preview = document.createElement('div');
      preview.className = 'preset-preview';
      preview.appendChild(buildMiniSVG(preset));

      var name = document.createElement('div');
      name.className = 'preset-name';
      name.textContent = preset.name;

      div.appendChild(preview);
      div.appendChild(name);

      div.addEventListener('click', function() {
        state.preset = key;
        state.palette = preset.palette.slice();
        renderPresetThumbnails();
        renderPaletteSwatches();
        renderPoster();
      });

      grid.appendChild(div);
    });
  }

  function renderPaletteSwatches() {
    var row = document.getElementById('palette-row');
    while (row.firstChild) row.removeChild(row.firstChild);
    state.palette.forEach(function(col, i) {
      var swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = col;
      var input = document.createElement('input');
      input.type = 'color';
      input.value = col;
      input.addEventListener('input', function(e) {
        state.palette[i] = e.target.value;
        swatch.style.background = e.target.value;
        var p = presets[state.preset];
        if (i === 0) p.bg = e.target.value;
        if (i === 1) { p.terrain = e.target.value; p.glow = e.target.value; }
        if (i === 2) { p.accent = e.target.value; p.contour = e.target.value; }
        if (i === 3) p.water = e.target.value;
        p.palette = state.palette.slice();
        renderPoster();
      });
      swatch.appendChild(input);
      row.appendChild(swatch);
    });
  }

  function renderLayers() {
    var icons = { terrain: '\u26f0', contours: '\u3030', streets: '\u2550', water: '\u301c', buildings: '\u25aa', labels: 'Aa' };
    var names = { terrain: 'Terrain', contours: 'Contours', streets: 'Streets', water: 'Water', buildings: 'Buildings', labels: 'Labels' };
    var card = document.getElementById('layers-card');
    while (card.firstChild) card.removeChild(card.firstChild);

    Object.keys(state.layers).forEach(function(key) {
      var on = state.layers[key];
      var item = document.createElement('div');
      item.className = 'layer-item';

      var info = document.createElement('div');
      info.className = 'layer-info';
      var icon = document.createElement('div');
      icon.className = 'layer-icon';
      icon.textContent = icons[key];
      var label = document.createElement('span');
      label.textContent = names[key];
      info.appendChild(icon);
      info.appendChild(label);

      var sw = document.createElement('div');
      sw.className = 'switch' + (on ? ' on' : '');
      sw.dataset.layer = key;
      sw.addEventListener('click', function() {
        state.layers[key] = !state.layers[key];
        this.classList.toggle('on');
        renderPoster();
      });

      item.appendChild(info);
      item.appendChild(sw);
      card.appendChild(item);
    });
  }

  function initSegment(id, stateKey) {
    var container = document.getElementById(id);
    container.querySelectorAll('.seg-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        container.querySelectorAll('.seg-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        state[stateKey] = btn.dataset.val;
        renderPoster();
      });
    });
  }

  function initDial() {
    var dial = document.getElementById('dial');
    var indicator = document.getElementById('dial-indicator');
    var valueEl = document.getElementById('dial-value');

    function updateDial() {
      indicator.style.transform = 'translateX(-50%) rotate(' + state.lightAngle + 'deg)';
      valueEl.textContent = Math.round(state.lightAngle) + '\u00b0';
    }

    var dragging = false;
    function onMove(e) {
      if (!dragging) return;
      var rect = dial.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      var clientX = e.clientX || (e.touches && e.touches[0].clientX);
      var clientY = e.clientY || (e.touches && e.touches[0].clientY);
      var angle = Math.atan2(clientY - cy, clientX - cx) * 180 / Math.PI + 90;
      if (angle < 0) angle += 360;
      state.lightAngle = angle;
      updateDial();
      renderPoster();
    }

    dial.addEventListener('mousedown', function() { dragging = true; });
    dial.addEventListener('touchstart', function() { dragging = true; });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('mouseup', function() { dragging = false; });
    window.addEventListener('touchend', function() { dragging = false; });

    updateDial();
  }

  function initSwitch(id, stateKey) {
    document.getElementById(id).addEventListener('click', function() {
      state[stateKey] = !state[stateKey];
      this.classList.toggle('on');
      renderPoster();
    });
  }

  // Init
  renderPresetThumbnails();
  renderPaletteSwatches();
  renderLayers();

  var elevSlider = document.getElementById('elev-scale');
  var elevVal = document.getElementById('elev-val');
  elevSlider.addEventListener('input', function() {
    state.elevScale = parseFloat(elevSlider.value);
    elevVal.textContent = state.elevScale.toFixed(1) + '\u00d7';
    renderPoster();
  });

  var marginSlider = document.getElementById('margin-slider');
  var marginVal = document.getElementById('margin-val');
  marginSlider.addEventListener('input', function() {
    state.margin = parseInt(marginSlider.value);
    marginVal.textContent = state.margin + 'px';
    renderPoster();
  });

  initSegment('contour-seg', 'contourDensity');
  initSegment('intensity-seg', 'lightIntensity');
  initSegment('street-seg', 'streetWeight');
  initSegment('textpos-seg', 'textPos');
  initDial();
  initSwitch('coords-toggle', 'showCoords');
  initSwitch('glow-toggle', 'glow');
  initSwitch('border-toggle', 'showBorder');

  document.getElementById('input-title').addEventListener('input', function(e) {
    state.title = e.target.value;
    renderPoster();
  });
  document.getElementById('input-subtitle').addEventListener('input', function(e) {
    state.subtitle = e.target.value;
    renderPoster();
  });

  renderPoster();
})();
</script>
</body>
</html>
