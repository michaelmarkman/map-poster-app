<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapPoster — Admin Dashboard</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="stylesheet" href="./community.css">
<style>
  .admin-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  @media (max-width: 900px) { .admin-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .admin-grid { grid-template-columns: 1fr; } }

  .stat-card {
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    padding: 24px;
    transition: all var(--transition);
  }
  .stat-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
  .stat-card-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  .stat-card-value {
    font-family: var(--serif);
    font-size: clamp(28px, 3vw, 36px);
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .stat-card-sub {
    font-size: 12px;
    color: var(--ink-dim);
  }
  .stat-card-sub .up { color: var(--success); }
  .stat-card-sub .down { color: var(--danger); }

  .admin-section {
    margin-bottom: 40px;
  }
  .admin-section h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .admin-table th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    background: var(--bg-2);
    border-bottom: 1px solid var(--panel-border);
    font-weight: 500;
  }
  .admin-table td {
    padding: 12px 16px;
    font-size: 14px;
    color: var(--ink-soft);
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: rgba(255,255,255,0.02); }

  .admin-table .avatar-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .admin-table .mini-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg-3);
    object-fit: cover;
    flex-shrink: 0;
  }

  .admin-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .admin-badge.new {
    background: rgba(94, 194, 105, 0.15);
    color: var(--success);
  }
  .admin-badge.active {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .chart-placeholder {
    background: var(--bg-1);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius-lg);
    padding: 32px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chart-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chart-bar-label {
    font-size: 12px;
    color: var(--ink-dim);
    min-width: 50px;
    text-align: right;
  }
  .chart-bar-track {
    flex: 1;
    height: 24px;
    background: var(--bg-2);
    border-radius: 6px;
    overflow: hidden;
  }
  .chart-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-soft), var(--accent));
    border-radius: 6px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .chart-bar-value {
    font-size: 12px;
    color: var(--ink-soft);
    min-width: 36px;
  }

  .admin-empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--ink-dim);
    font-size: 14px;
  }
  .admin-empty-icon {
    font-size: 40px;
    opacity: 0.3;
    margin-bottom: 12px;
  }

  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-dim);
    background: none;
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 6px 14px;
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--body);
  }
  .refresh-btn:hover { color: var(--ink-soft); border-color: rgba(255,255,255,0.15); }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
  .refresh-icon { display: inline-block; }

  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .admin-header h1 {
    font-family: var(--serif);
    font-size: clamp(24px, 3vw, 32px);
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .admin-header-sub {
    font-size: 14px;
    color: var(--ink-dim);
    margin-top: 4px;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-lg);
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="./" class="nav-logo">MapPoster</a>
    <div class="nav-links">
      <a href="./community.html">Community</a>
      <a href="./poster-v3-ui.html" class="btn btn-primary btn-sm">Editor</a>
    </div>
  </div>
</nav>

<div id="root"></div>
<script type="module" src="./admin.jsx"></script>

</body>
</html>
